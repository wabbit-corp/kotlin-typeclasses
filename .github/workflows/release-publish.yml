name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  determine-kotlin-matrix:
    runs-on: ubuntu-latest
    outputs:
      kotlin_versions: ${{ steps.kotlin_matrix.outputs.kotlin_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read supported Kotlin matrix
        id: kotlin_matrix
        run: |
          KOTLIN_VERSIONS="$(python3 - <<'PY'
          import json
          from pathlib import Path

          properties = {}
          for raw_line in Path("gradle.properties").read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              properties[key.strip()] = value.strip()

          versions = [value.strip() for value in properties.get("supportedKotlinVersions", "").split(",") if value.strip()]
          if not versions:
              raise SystemExit("supportedKotlinVersions is empty")

          print(json.dumps(versions))
          PY
          )"
          printf 'kotlin_versions=%s\n' "${KOTLIN_VERSIONS}" >> "$GITHUB_OUTPUT"

  publish-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle


      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Assert annotated release tag
        if: github.event_name == 'push'
        run: |
          git fetch --force --tags origin
          TAG_TYPE="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)')"
          test "${TAG_TYPE}" = "tag"

      - name: Validate release version
        run: ./gradlew --no-daemon :kotlin-typeclasses:assertReleaseVersion :gradle-plugin:assertReleaseVersion

      - name: Match tag to published version
        if: github.event_name == 'push'
        run: |
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          ACTUAL_VERSIONS="$(./gradlew --quiet --no-daemon :kotlin-typeclasses:printBaseVersion :compiler-plugin:printBaseVersion :gradle-plugin:printBaseVersion)"
          ACTUAL_VERSIONS="$(printf '%s\n' "${ACTUAL_VERSIONS}" | sed '/^[[:space:]]*$/d')"
          UNIQUE_VERSIONS="$(printf '%s\n' "${ACTUAL_VERSIONS}" | sort -u)"
          test "$(printf '%s\n' "${UNIQUE_VERSIONS}" | wc -l | tr -d ' ')" = "1"
          test "${UNIQUE_VERSIONS}" = "${EXPECTED_VERSION}"

      - name: Dry run release build
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew --no-daemon build

      - name: Publish release to Maven Central
        if: github.event_name == 'push'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: ./gradlew --no-daemon build :kotlin-typeclasses:publishAndReleaseToMavenCentral :gradle-plugin:publishAndReleaseToMavenCentral

  publish-compiler-plugin:
    needs:
      - determine-kotlin-matrix
      - publish-core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kotlin-version: ${{ fromJson(needs.determine-kotlin-matrix.outputs.kotlin_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Validate compiler plugin release version
        run: ./gradlew --no-daemon -PkotlinVersion=${{ matrix.kotlin-version }} :compiler-plugin:assertReleaseVersion

      - name: Dry run compiler plugin build
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew --no-daemon -PkotlinVersion=${{ matrix.kotlin-version }} :compiler-plugin:build

      - name: Publish compiler plugin to Maven Central
        if: github.event_name == 'push'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: ./gradlew --no-daemon -PkotlinVersion=${{ matrix.kotlin-version }} :compiler-plugin:publishAndReleaseToMavenCentral
